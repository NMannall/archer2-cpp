name: build-lecture-pdfs

on:
  push:
    branches: [ "51-generate-lecture-pdfs" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v5

    - name: Get changed lectures
      id: changed-lectures
      uses: tj-actions/changed-files@v47.0.2
      with:
        files: |
          lectures/**/{README.md,index.html}

    - if: steps.changed-lectures.outputs.any_changed == 'true'
      name: List changed files
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-lectures.outputs.all_changed_files }}
      run: |
        for file in ${ALL_CHANGED_FILES}; do
          echo "$file was changed"
        done

    - if: steps.changed-lectures.outputs.any_changed == 'true'
      name: Install dependencies
      run: npm install -g decktape

    - if: steps.changed-lectures.outputs.any_changed == 'true'
      name: Generate lecture slides
      run: decktape --chrome-arg=--disable-web-security --chrome-arg=--no-sandbox remark ${{ github.workspace }}/lectures/0-course-intro-2-days/index.html ${{ github.workspace }}/slides.pdf
    
    - if: steps.changed-lectures.outputs.any_changed == 'true'
      name: Commit and push PDFs
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add *.pdf
        git commit -m "Update generated PDFs" || echo "No changes to commit"
        git push
