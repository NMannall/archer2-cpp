name: build-lecture-pdfs

on:
  push:
    branches: [ "51-generate-lecture-pdfs" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v5

    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v4
      env:
        cache-name: cache-node-modules
      with:
        # npm cache files are stored in `~/.npm` on Linux/macOS
        path: ~/.npm
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - if: ${{ steps.cache-npm.outputs.cache-hit == 'true' }}
      name: List the state of node modules
      continue-on-error: true
      run: npm list

    - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
    - name: Install dependencies
      run: npm install -g decktape

    - name: Generate lecture slides
      run: decktape --chrome-arg=--disable-web-security --chrome-arg=--no-sandbox remark ${{ github.workspace }}/lectures/0-course-intro-2-days/index.html ${{ github.workspace }}/slides.pdf
    
    - name: Commit and push PDFs
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add *.pdf
        git commit -m "Update generated PDFs" || echo "No changes to commit"
        git push
